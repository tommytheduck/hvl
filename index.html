      transform-origin: bottom center;
      filter: contrast(1.35);

    .mosh-pit i {

      left: var(--x);
      bottom: -3vh;
      width: var(--w);
      height: var(--h);
      border-radius: 44% 44% 12% 12%;

    .mosh-pit i::after {
      right: -52%;
      rotate: calc(var(--dir) * 34deg);

  </style>

      currentIndex = index;

      const entry = lyricCues[index];
      const upcoming = lyricCues[index + 1];
      const isHook = entry.hook || /vamp|giải thích|thích àkkk/i.test(`${entry.text} ${entry.sub || ""}`);

      currentLyric.innerHTML = renderCue(entry);
      currentLyric.dataset.text = `${entry.text} ${entry.sub || ""}`;
      shadowText.textContent = entry.tag || (isHook ? "VAMP" : "MCK");

      document.body.classList.add("beat");
      window.setTimeout(() => document.body.classList.remove("beat"), 180);

      anime.remove([currentLyric, shadowText, ring]);
      anime.timeline({ easing: "easeOutExpo" })
        .add({
          targets: currentLyric,
          opacity: [0, 1, 0.72, 1],
          translateY: [isHook ? -120 : 90, 0],
          translateX: [isHook ? anime.random(-140, 140) : anime.random(-54, 54), anime.random(-18, 18), 0],
          scaleX: [isHook ? 1.85 : 1.35, 0.78, 1.08, 1],
          scaleY: [0.48, 1.35, 0.92, 1],
          skewX: [0, 0],
          filter: ["blur(8px) contrast(2.8)", "blur(0px) contrast(1.35)"],
          duration: isHook ? 300 : 390
        })
        .add({
          targets: currentLyric.querySelectorAll(".pulse-word"),
          color: ["#c5ff2e", "#ff2e8a", "#f7f2ff", "#c5ff2e"],
          translateY: [-34, 16, 0],
          translateX: [() => anime.random(-18, 18), 0],
          scale: [2.1, 0.72, 1],
          rotate: [() => anime.random(-5, 5), 0],
          delay: anime.stagger(18),
          duration: 390
        }, "-=250")
        ;

      anime({
        targets: ring,
        rotate: isHook ? "+=260" : "+=150",
        scale: [isHook ? 1.38 : 1.12, 1],
        borderColor: isHook ? "rgba(197, 255, 46, 0.7)" : "rgba(255, 46, 138, 0.36)",
        duration: isHook ? 520 : 780,
        easing: "easeOutElastic(1, .55)"
      });

      anime({
        targets: shadowText,
        opacity: [1, 0.18],
        translateX: [anime.random(-60, 60), 0],
        translateY: [anime.random(-22, 22), 0],
        scale: [isHook ? 1.5 : 1.22, 1],
        skewX: [anime.random(-20, 20), 0],
        duration: isHook ? 440 : 560,
        easing: "easeOutQuad"
      });

      triggerImpact(isHook ? 2.4 : 1.2);
    }

    function updateLyricFromTime() {
      const t = audio.currentTime;
      let nextIndex = -1;

      for (let i = 0; i < lyricCues.length; i += 1) {
        if (t >= lyricCues[i].time) nextIndex = i;
      }

      if (nextIndex >= 0) setLyric(nextIndex);
      if (nextIndex < 0 && currentIndex !== -1) {
        currentIndex = -1;
        currentLyric.textContent = "Press play";
        currentLyric.dataset.text = "Press play";
      }
    }

    function drawFallbackBars(width, height, now) {
      const bars = 72;
      for (let i = 0; i < bars; i += 1) {
        const x = (i / bars) * width;
        const wave = Math.sin(now * 0.002 + i * 0.34) * 0.5 + 0.5;
        const barHeight = 30 + wave * 180;
        ctx.fillStyle = i % 3 === 0 ? "rgba(197,255,46,.36)" : "rgba(161,0,255,.42)";
        ctx.fillRect(x, height - barHeight, width / bars - 3, barHeight);
      }
    }

    function updateCamera(rawBass) {
      impactKick *= 0.9;
      const heat = Math.min(1, rawBass * 1.25 + impactKick);
      const shake = heat * heat * 16;
      const x = (Math.random() - 0.5) * shake;
      const y = (Math.random() - 0.5) * shake;
      const tilt = 0;
      const zoom = 1 + heat * 0.045 + impactKick * 0.025;

      document.body.style.setProperty("--bass-zoom", zoom.toFixed(3));
      document.body.style.setProperty("--shake-x", `${x.toFixed(1)}px`);
      document.body.style.setProperty("--shake-y", `${y.toFixed(1)}px`);
      document.body.style.setProperty("--tilt", `${tilt.toFixed(2)}deg`);
      document.body.style.setProperty("--pit-y", `${(heat * -12 + Math.random() * heat * 6).toFixed(1)}px`);
      document.body.style.setProperty("--pit-squash", (1 + heat * 0.12).toFixed(3));

      if (heat > 0.68 && performance.now() - lastHardBeat > 260) {
        lastHardBeat = performance.now();
        triggerImpact(0.8 + heat);
      }
    }

    function drawVisualizer(now = 0) {
      const width = window.innerWidth;
      const height = window.innerHeight;
      ctx.clearRect(0, 0, width, height);

      const gradient = ctx.createRadialGradient(width / 2, height * 0.44, 20, width / 2, height * 0.44, Math.max(width, height) * 0.72);
      gradient.addColorStop(0, "rgba(161, 0, 255, 0.22)");
      gradient.addColorStop(0.42, "rgba(255, 23, 61, 0.12)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      if (analyser) {
        analyser.getByteFrequencyData(frequencyData);
        const bars = frequencyData.length;
        const centerX = width / 2;
        const centerY = height / 2;
        const baseRadius = Math.min(width, height) * 0.2;
        const bass = frequencyData.slice(0, 10).reduce((sum, value) => sum + value, 0) / (10 * 255);
        bassLevel = bassLevel * 0.82 + bass * 0.18;
        updateCamera(bassLevel);

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(now * 0.00045 + bassLevel * 0.35);
        for (let i = 0; i < bars; i += 2) {
          const value = frequencyData[i] / 255;
          const angle = (i / bars) * Math.PI * 2;
          const length = 42 + value * Math.min(width, height) * 0.38 + bassLevel * 70;
          const inner = baseRadius + bassLevel * 18;
          const x1 = Math.cos(angle) * inner;
          const y1 = Math.sin(angle) * inner;
          const x2 = Math.cos(angle) * (inner + length);
          const y2 = Math.sin(angle) * (inner + length);
          ctx.strokeStyle = i % 4 === 0
            ? `rgba(197, 255, 46, ${0.18 + value * 0.75})`
            : `rgba(${170 + value * 85}, ${20 + value * 40}, ${255 - value * 120}, ${0.18 + value * 0.7})`;
          ctx.lineWidth = 1 + value * 5 + bassLevel * 2;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
        ctx.restore();
      } else {
        bassLevel = bassLevel * 0.96 + 0.05;
        updateCamera(bassLevel);
        drawFallbackBars(width, height, now);
      }

      updateLyricFromTime();

      rafId = requestAnimationFrame(drawVisualizer);
    }

    async function playTrack() {
      setupAudioGraph();
      if (audioContext.state === "suspended") await audioContext.resume();
      await audio.play();
      playButton.classList.add("is-playing");
      playButton.setAttribute("aria-label", "Pause");
      if (!rafId) drawVisualizer();
    }

    function pauseTrack() {
      audio.pause();
      playButton.classList.remove("is-playing");
      playButton.setAttribute("aria-label", "Play");
    }

    playButton.addEventListener("click", async () => {
      try {
        if (audio.paused) {
          await playTrack();
        } else {
          pauseTrack();
        }
      } catch (error) {
        currentLyric.textContent = "Audio blocked";
        currentLyric.dataset.text = "Audio blocked";
      }
    });

    audio.addEventListener("ended", () => {
      playButton.classList.remove("is-playing");
      playButton.setAttribute("aria-label", "Play");
    });

    window.addEventListener("resize", fitCanvas);
    fitCanvas();
    drawVisualizer();
  </script>
</body>
</html>
